<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laboratorio Individual - 1</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Google Fonts: Título llamativo + cuerpo legible -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet" />

    <!-- Hoja de estilos externa -->
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

    <!-- =============================================
       HEADER
       ============================================= -->
    <header>
        <h1>Laboratorio Individual &mdash; 1</h1>
        <span class="hint-f5">F5 = Analizar</span>
    </header>

    <!-- =============================================
       LAYOUT PRINCIPAL
       ============================================= -->
    <div class="main-content">

        <!-- ========== COLUMNA IZQUIERDA: Editor ========== -->
        <div class="col-editor">
            <label for="editor">ENTRADA (editor de texto)</label>
            <textarea id="editor" placeholder="Escribe o pega tu texto aquí..."></textarea>
            <p class="instruccion">Presiona <span>F5</span> para analizar el texto</p>
        </div>

        <!-- ========== COLUMNA DERECHA: Resultados ========== -->
        <div class="col-resultados">

            <!-- Tabla 1: Resumen general -->
            <div>
                <p class="seccion-titulo">Matriz de Entradas</p>
                <table class="tabla-resultados">
                    <thead>
                        <tr>
                            <th>Entradas</th>
                            <th style="text-align:right;">Cantidad</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-entradas">
                        <tr>
                            <td colspan="2" class="estado-vacio">Aún no se ha analizado texto</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Tabla 2: Detalle de vocales -->
            <div>
                <p class="seccion-titulo">Matriz de Vocales</p>
                <table class="tabla-resultados">
                    <thead>
                        <tr>
                            <th>Vocal</th>
                            <th style="text-align:right;">Cantidad</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-vocales">
                        <tr>
                            <td colspan="2" class="estado-vacio">Aún no se ha analizado texto</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div><!-- fin main-content -->

    <!-- Script externo -->
    <script src="./js/script.js"></script>

</body>

</html>
